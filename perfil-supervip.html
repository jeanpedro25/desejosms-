<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil Super VIP - DesejosMS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cinzel:wght@400;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --red:       #8B0000;
            --red-mid:   #B22222;
            --red-light: #DC143C;
            --gold:      #D4AF37;
            --gold-lt:   #FFD700;
            --cream:     #FFF8F0;
            --dark:      #1a0000;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--red);
            background-image:
                radial-gradient(circle at 20% 20%, rgba(180,50,50,.35) 0%, transparent 45%),
                radial-gradient(circle at 80% 80%, rgba(180,50,50,.35) 0%, transparent 45%);
            min-height: 100vh;
            color: #333;
        }

        /* ===== HEADER ===== */
        .svip-header {
            background: linear-gradient(135deg, #0d0d0d 0%, #1a0000 60%, #0d0d0d 100%);
            border-bottom: 2px solid var(--gold);
            padding: 14px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 24px rgba(0,0,0,.6);
        }
        .svip-header-inner {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .svip-logo {
            font-family: 'Cinzel', serif;
            font-size: 1.6rem;
            color: var(--gold);
            text-decoration: none;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: 1px;
            text-shadow: 0 0 20px rgba(212,175,55,.4);
        }
        .svip-logo i { font-size: 1.3rem; }
        .svip-back {
            color: rgba(255,255,255,.75);
            text-decoration: none;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 6px;
            border: 1px solid rgba(212,175,55,.3);
            padding: 8px 16px;
            border-radius: 30px;
            transition: all .25s ease;
            font-weight: 500;
        }
        .svip-back:hover {
            color: var(--gold);
            border-color: var(--gold);
            background: rgba(212,175,55,.08);
        }

        /* ===== HERO BANNER com foto principal ===== */
        .hero-banner {
            width: 100%;
            max-width: 1100px;
            margin: 32px auto 0;
            padding: 0 20px;
        }
        .hero-inner {
            border-radius: 24px;
            overflow: hidden;
            position: relative;
            background: linear-gradient(135deg, #1a0000, #2d0000);
            border: 1.5px solid rgba(212,175,55,.35);
            box-shadow: 0 20px 60px rgba(0,0,0,.5), 0 0 0 1px rgba(212,175,55,.1);
        }
        /* Faixa dourada no topo */
        .hero-inner::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--gold), var(--gold-lt), var(--gold), transparent);
            z-index: 2;
        }

        /* ===== GRID PRINCIPAL ===== */
        .main-grid {
            max-width: 1100px;
            margin: 28px auto 0;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            gap: 24px;
        }

        /* ===== GALERIA ===== */
        .gallery-wrap {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .gallery-heading {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .gallery-heading::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, rgba(212,175,55,.4), transparent);
        }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .gallery-thumb {
            aspect-ratio: 3/4;
            border-radius: 14px;
            overflow: hidden;
            cursor: pointer;
            border: 1.5px solid rgba(255,255,255,.08);
            position: relative;
            transition: all .3s ease;
            box-shadow: 0 4px 16px rgba(0,0,0,.4);
        }
        .gallery-thumb::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(139,0,0,.6) 0%, transparent 50%);
            opacity: 0;
            transition: opacity .3s ease;
        }
        .gallery-thumb:hover {
            border-color: var(--gold);
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(139,0,0,.5), 0 0 0 1px rgba(212,175,55,.3);
        }
        .gallery-thumb:hover::after { opacity: 1; }
        .gallery-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform .5s ease;
        }
        .gallery-thumb:hover img { transform: scale(1.07); }
        .thumb-zoom {
            position: absolute;
            bottom: 10px;
            right: 10px;
            color: white;
            font-size: 0.75rem;
            z-index: 3;
            opacity: 0;
            transition: opacity .3s ease;
        }
        .gallery-thumb:hover .thumb-zoom { opacity: 1; }

        /* ===== PAINEL DE INFO ===== */
        .info-wrap {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        /* Card do nome e badge */
        .profile-card {
            background: #fff;
            border-radius: 20px;
            padding: 28px 24px;
            border: 1.5px solid rgba(139,0,0,.12);
            box-shadow: 0 8px 32px rgba(0,0,0,.12), 0 0 0 1px rgba(212,175,55,.08);
            position: relative;
            overflow: hidden;
        }
        .profile-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--red), var(--red-light), var(--gold), var(--red-light), var(--red));
        }
        .supervip-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: linear-gradient(135deg, var(--gold), var(--gold-lt), var(--gold));
            color: #4a2800;
            font-size: 0.75rem;
            font-weight: 800;
            letter-spacing: 1.5px;
            padding: 5px 14px;
            border-radius: 30px;
            margin-bottom: 14px;
            box-shadow: 0 4px 14px rgba(212,175,55,.4);
            text-transform: uppercase;
        }
        .profile-name-big {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--red);
            line-height: 1.1;
            margin-bottom: 10px;
        }
        .profile-meta-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
        }
        .meta-pill {
            display: flex;
            align-items: center;
            gap: 5px;
            background: var(--cream);
            border: 1px solid rgba(139,0,0,.15);
            border-radius: 20px;
            padding: 5px 12px;
            font-size: 0.82rem;
            color: #555;
            font-weight: 500;
        }
        .meta-pill i { color: var(--red); font-size: 0.75rem; }

        /* Divisor dourado */
        .gold-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin: 16px 0;
            opacity: .5;
        }

        /* Botões de ação */
        .action-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .btn-call {
            padding: 14px 10px;
            border: none;
            border-radius: 12px;
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: 0.92rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all .25s ease;
            letter-spacing: .3px;
        }
        .btn-phone-red {
            background: linear-gradient(135deg, var(--red), var(--red-mid));
            color: #fff;
            box-shadow: 0 4px 16px rgba(139,0,0,.35);
        }
        .btn-phone-red:hover {
            box-shadow: 0 8px 24px rgba(139,0,0,.5);
            transform: translateY(-2px);
        }
        .btn-wpp {
            background: linear-gradient(135deg, #25D366, #128C7E);
            color: #fff;
            box-shadow: 0 4px 16px rgba(37,211,102,.25);
        }
        .btn-wpp:hover {
            box-shadow: 0 8px 24px rgba(37,211,102,.4);
            transform: translateY(-2px);
        }

        /* Cards de detalhe (valor / disponib.) */
        .detail-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .detail-box {
            background: #fff;
            border-radius: 14px;
            padding: 16px;
            border: 1.5px solid rgba(139,0,0,.1);
            box-shadow: 0 4px 12px rgba(0,0,0,.06);
        }
        .detail-box-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--red);
            font-weight: 700;
            margin-bottom: 4px;
        }
        .detail-box-val {
            font-size: 1.05rem;
            font-weight: 700;
            color: #222;
        }

        /* Card de seção (sobre / serviços) */
        .section-card {
            background: #fff;
            border-radius: 18px;
            padding: 22px 22px;
            border: 1.5px solid rgba(139,0,0,.1);
            box-shadow: 0 4px 16px rgba(0,0,0,.07);
        }
        .section-heading {
            font-family: 'Cinzel', serif;
            color: var(--red);
            font-size: 0.85rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 14px;
        }
        .section-heading::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, rgba(139,0,0,.25), transparent);
        }
        .bio-txt {
            color: #555;
            font-size: 0.92rem;
            line-height: 1.75;
        }
        .tags-wrap {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .svc-tag {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(139,0,0,.06);
            border: 1px solid rgba(139,0,0,.15);
            color: var(--red);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.82rem;
            font-weight: 500;
            transition: all .2s;
        }
        .svc-tag:hover {
            background: var(--red);
            color: #fff;
        }
        .svc-tag i { font-size: 0.7rem; }

        /* Card de Avaliações */
        .rating-card {
            background: linear-gradient(135deg, var(--red) 0%, #6b0000 100%);
            border-radius: 18px;
            padding: 22px;
            text-align: center;
            color: #fff;
            box-shadow: 0 8px 28px rgba(139,0,0,.35);
            border: 1px solid rgba(212,175,55,.2);
        }
        .rating-num {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            font-weight: 700;
            color: var(--gold-lt);
            line-height: 1;
        }
        .stars-row {
            color: var(--gold-lt);
            font-size: 1.1rem;
            margin: 8px 0 4px;
            letter-spacing: 2px;
        }
        .rating-sub {
            font-size: 0.78rem;
            opacity: .7;
            letter-spacing: .5px;
        }

        /* ===== LIGHTBOX ===== */
        .lightbox {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.92);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity .3s ease;
        }
        .lightbox.open {
            opacity: 1;
            pointer-events: all;
        }
        .lightbox img {
            max-width: 88vw;
            max-height: 88vh;
            border-radius: 12px;
            border: 2px solid rgba(212,175,55,.4);
            object-fit: contain;
        }
        .lb-close {
            position: absolute;
            top: 20px; right: 24px;
            color: #fff;
            font-size: 2rem;
            cursor: pointer;
            transition: color .2s;
            background: none; border: none;
        }
        .lb-close:hover { color: var(--gold-lt); }
        .lb-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(139,0,0,.7);
            border: 1px solid rgba(212,175,55,.3);
            color: #fff;
            width: 48px; height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all .2s;
            backdrop-filter: blur(4px);
        }
        .lb-nav:hover { background: var(--red); border-color: var(--gold); }
        .lb-prev { left: 24px; }
        .lb-next { right: 24px; }

        /* ===== FOOTER ===== */
        .svip-footer {
            background: #0d0d0d;
            border-top: 1px solid rgba(212,175,55,.2);
            color: #555;
            text-align: center;
            padding: 24px;
            margin-top: 48px;
            font-size: 0.82rem;
        }
        .svip-footer span { color: var(--gold); }

        /* ===== MOBILE ===== */
        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr;
                margin-top: 20px;
            }
            .gallery-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 7px;
            }
            .profile-name-big {
                font-size: 1.7rem;
            }
            .action-row {
                gap: 10px;
            }
            .btn-call {
                font-size: 0.85rem;
                padding: 13px 8px;
            }
            .lb-prev { left: 10px; }
            .lb-next { right: 10px; }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="svip-header">
        <div class="svip-header-inner">
            <a href="/" class="svip-logo">
                <i class="fas fa-crown"></i> DesejosMS
            </a>
            <a href="index.html" class="svip-back">
                <i class="fas fa-arrow-left"></i> Voltar
            </a>
        </div>
    </header>

    <!-- Layout principal -->
    <div class="main-grid">

        <!-- Coluna Esquerda: Galeria -->
        <div class="gallery-wrap">
            <div class="gallery-heading">
                <i class="fas fa-images" style="color:var(--gold)"></i> Galeria de Fotos
            </div>
            <div class="gallery-grid" id="galleryGrid">
                <!-- Fotos inseridas via JS -->
            </div>

            <!-- Card de Avaliações (só no desktop, na esquerda) -->
            <div class="rating-card" style="margin-top:4px;">
                <div class="rating-num">5.0</div>
                <div class="stars-row">★★★★★</div>
                <div class="rating-sub">Baseado em avaliações verificadas</div>
            </div>
        </div>

        <!-- Coluna Direita: Informações -->
        <div class="info-wrap">

            <!-- Card principal de perfil -->
            <div class="profile-card">
                <div class="supervip-badge">
                    <i class="fas fa-gem"></i> SUPER VIP
                </div>
                <h1 class="profile-name-big" id="profileName">Carregando...</h1>
                <div class="profile-meta-row">
                    <div class="meta-pill"><i class="fas fa-birthday-cake"></i><span id="profileAge">--</span> anos</div>
                    <div class="meta-pill"><i class="fas fa-map-marker-alt"></i><span id="profileCity">--</span></div>
                    <div class="meta-pill"><i class="fas fa-hashtag"></i>Ref: <span id="profileRef">--</span></div>
                </div>

                <div class="gold-divider"></div>

                <div class="action-row">
                    <button class="btn-call btn-phone-red" onclick="makeCall()">
                        <i class="fas fa-phone-alt"></i> Ligar
                    </button>
                    <button class="btn-call btn-wpp" onclick="openWhatsApp()">
                        <i class="fab fa-whatsapp"></i> WhatsApp
                    </button>
                </div>
            </div>

            <!-- Valor e disponibilidade -->
            <div class="detail-row">
                <div class="detail-box">
                    <div class="detail-box-label"><i class="fas fa-tag"></i> Valor</div>
                    <div class="detail-box-val" id="profileValue">A combinar</div>
                </div>
                <div class="detail-box">
                    <div class="detail-box-label"><i class="fas fa-clock"></i> Disponibilidade</div>
                    <div class="detail-box-val" id="profileAvailability">Consultar</div>
                </div>
            </div>

            <!-- Sobre Mim -->
            <div class="section-card">
                <div class="section-heading">
                    <i class="fas fa-user-circle"></i> Sobre Mim
                </div>
                <p class="bio-txt" id="profileBio">Carregando...</p>
            </div>

            <!-- Serviços e Locais -->
            <div class="section-card">
                <div class="section-heading">
                    <i class="fas fa-concierge-bell"></i> Serviços & Atendimento
                </div>
                <div class="tags-wrap" id="servicesList"></div>

                <div style="margin-top:16px;">
                    <div class="section-heading" style="font-size:.75rem;">
                        <i class="fas fa-map-marker-alt"></i> Locais de Atendimento
                    </div>
                    <div class="tags-wrap" id="atendimentoList"></div>
                </div>
            </div>

        </div>
    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <button class="lb-close" onclick="closeLb()"><i class="fas fa-times"></i></button>
        <button class="lb-nav lb-prev" onclick="navLb(-1)"><i class="fas fa-chevron-left"></i></button>
        <img id="lbImg" src="" alt="Foto ampliada">
        <button class="lb-nav lb-next" onclick="navLb(1)"><i class="fas fa-chevron-right"></i></button>
    </div>

    <!-- Footer -->
    <footer class="svip-footer">
        <p>© 2024 <span>DesejosMS</span> — Onde seus desejos ganham vida.</p>
    </footer>

    <script>
        let photos = [];
        let lbIndex = 0;

        function getProfileId() {
            const p = new URLSearchParams(window.location.search);
            let id = p.get('id') || localStorage.getItem('selectedProfileId');
            if (!id) {
                const ads = JSON.parse(localStorage.getItem('announcements') || '[]');
                const sv = ads.find(a => a.planType === 'supervip' && a.status !== 'inactive');
                if (sv) id = sv.id;
            }
            return id;
        }

        document.addEventListener('DOMContentLoaded', () => {
            const id = getProfileId();
            const ads = JSON.parse(localStorage.getItem('announcements') || '[]');
            let p = ads.find(a => String(a.id) === String(id));
            if (!p) p = ads.find(a => a.planType === 'supervip');
            if (!p) { alert('Perfil não encontrado!'); window.location.href = 'index.html'; return; }

            window.currentProfile = p;

            document.getElementById('profileName').textContent = p.name;
            document.getElementById('profileAge').textContent = p.age;
            document.getElementById('profileCity').textContent = p.city;
            document.getElementById('profileRef').textContent = p.id;
            document.getElementById('profileValue').textContent = p.price || 'A combinar';
            document.getElementById('profileAvailability').textContent = p.availability || 'Consultar';
            document.getElementById('profileBio').textContent = p.description || p.bio || 'Sem descrição disponível.';
            document.title = `${p.name} - Super VIP | DesejosMS`;

            // Fotos
            photos = p.photos || [];
            if (!photos.length && p.photo) photos = [p.photo];
            if (!photos.length && p.image) photos = [p.image];

            const grid = document.getElementById('galleryGrid');
            grid.innerHTML = '';
            photos.forEach((ph, i) => {
                const d = document.createElement('div');
                d.className = 'gallery-thumb';
                d.innerHTML = `<img src="${ph}" alt="Foto ${i+1}" oncontextmenu="return false"><span class="thumb-zoom"><i class="fas fa-expand"></i></span>`;
                d.onclick = () => openLb(i);
                grid.appendChild(d);
            });

            // Serviços
            loadTags(p.services, 'servicesList', 'fa-check');
            loadTags(p.atendimento || [], 'atendimentoList', 'fa-map-marker-alt');
        });

        function loadTags(items, elId, icon) {
            const container = document.getElementById(elId);
            container.innerHTML = '';
            const list = Array.isArray(items) ? items : (typeof items === 'string' ? items.split(',').map(s => s.trim()) : []);
            list.forEach(item => {
                if (!item) return;
                const t = document.createElement('div');
                t.className = 'svc-tag';
                t.innerHTML = `<i class="fas ${icon}"></i> ${item}`;
                container.appendChild(t);
            });
        }

        function makeCall() {
            const p = window.currentProfile;
            if (p && p.phone) window.location.href = `tel:${p.phone}`;
            else alert('Telefone não disponível');
        }

        function openWhatsApp() {
            const p = window.currentProfile;
            if (p && (p.whatsapp || p.phone)) {
                const num = (p.whatsapp || p.phone).replace(/\D/g, '');
                const msg = `Olá ${p.name}, vi seu perfil Super VIP no DesejosMS e gostaria de mais informações.`;
                window.open(`https://wa.me/55${num}?text=${encodeURIComponent(msg)}`, '_blank');
            } else { alert('WhatsApp não disponível'); }
        }

        // Lightbox
        function openLb(i) {
            lbIndex = i;
            document.getElementById('lbImg').src = photos[lbIndex];
            document.getElementById('lightbox').classList.add('open');
        }
        function closeLb() {
            document.getElementById('lightbox').classList.remove('open');
        }
        function navLb(dir) {
            lbIndex = (lbIndex + dir + photos.length) % photos.length;
            document.getElementById('lbImg').src = photos[lbIndex];
        }
        document.getElementById('lightbox').addEventListener('click', e => {
            if (e.target.id === 'lightbox') closeLb();
        });
        document.addEventListener('keydown', e => {
            if (!document.getElementById('lightbox').classList.contains('open')) return;
            if (e.key === 'Escape') closeLb();
            if (e.key === 'ArrowRight') navLb(1);
            if (e.key === 'ArrowLeft') navLb(-1);
        });
    </script>
</body>
</html>
