<!DOCTYPE html>
<html lang="pt-BR">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Recuperar Senha - DesejosMS</title>
	<link rel="stylesheet" href="styles.css" />
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
	<style>
		body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:#0b132b; }
		.card { background:#fff; padding:24px; border-radius:12px; width:100%; max-width: 420px; box-shadow:0 10px 30px rgba(0,0,0,.15); }
		.card h1 { margin:0 0 12px; color:#8B0000; font-size:22px; }
		.form-group { margin-bottom:12px; }
		label { display:block; font-weight:600; margin-bottom:6px; color:#333; }
		input { width:100%; padding:10px 12px; border:1px solid #ddd; border-radius:8px; }
		.actions { display:flex; gap:10px; margin-top:12px; }
		.btn { flex:1; padding:10px 14px; border:none; border-radius:8px; cursor:pointer; font-weight:700; }
		.btn-primary { background:#8B0000; color:#fff; }
		.btn-secondary { background:#eee; }
		.msg { margin-top:10px; color:#28a745; font-weight:600; display:none; }
	</style>
	<script>
		function sendReset(e){
			e.preventDefault();
			const email = document.getElementById('email').value.trim().toLowerCase();
			const users = JSON.parse(localStorage.getItem('users')||'[]');
			const user = users.find(u=> (u.email||'').toLowerCase()===email);
			const msg = document.getElementById('msg');
			if(!user){ msg.textContent='Se o email existir, enviaremos instruções.'; msg.style.display='block'; return; }
			// Reset simples: gerar token e salvar no storage
			const token = 'RST-' + Math.random().toString(36).slice(2,8).toUpperCase();
			localStorage.setItem('resetToken:'+email, token);
			msg.textContent = 'Enviamos instruções de reset (simulado). Token: '+token;
			msg.style.display='block';
		}
		function applyReset(e){
			e.preventDefault();
			const email = document.getElementById('email').value.trim().toLowerCase();
			const token = document.getElementById('token').value.trim().toUpperCase();
			const newPass = document.getElementById('newpass').value.trim();
			const saved = localStorage.getItem('resetToken:'+email);
			if(!saved || saved !== token){ alert('Token inválido.'); return; }
			if(newPass.length < 6 || !/[A-Za-z]/.test(newPass) || !/[0-9]/.test(newPass)){
				alert('Senha fraca. Use pelo menos 6 caracteres com letras e números.');
				return;
			}
			let users = JSON.parse(localStorage.getItem('users')||'[]');
			const idx = users.findIndex(u=> (u.email||'').toLowerCase()===email);
			if(idx===-1){ alert('Usuário não encontrado.'); return; }
			users[idx].password = newPass;
			localStorage.setItem('users', JSON.stringify(users));
			localStorage.removeItem('resetToken:'+email);
			alert('Senha alterada com sucesso! Faça login.');
			window.location.href='login.html';
		}
	</script>
</head>
<body>
	<form class="card" onsubmit="sendReset(event)">
		<h1>Recuperar Senha</h1>
		<div class="form-group">
			<label>Email</label>
			<input id="email" type="email" required placeholder="seu@email.com" />
		</div>
		<div class="actions">
			<button class="btn btn-secondary" type="button" onclick="window.location.href='login.html'">Voltar</button>
			<button class="btn btn-primary" type="submit"><i class="fas fa-envelope"></i> Enviar</button>
		</div>
		<div id="msg" class="msg"></div>
	</form>

	<form class="card" onsubmit="applyReset(event)" style="margin-top:16px;">
		<h1>Aplicar Token</h1>
		<div class="form-group">
			<label>Token</label>
			<input id="token" placeholder="RST-ABCD12" required />
		</div>
		<div class="form-group">
			<label>Nova Senha</label>
			<input id="newpass" type="password" placeholder="••••••••" required />
		</div>
		<div class="actions">
			<button class="btn btn-primary" type="submit"><i class="fas fa-check"></i> Alterar Senha</button>
		</div>
	</form>
</body>
</html>
